<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to My S3 Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #007bff, #00c6ff);
      color: white;
      text-align: center;
      padding: 100px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    p {
      font-size: 20px;
      margin-bottom: 40px;
    }
    a {
      background-color: white;
      color: #007bff;
      padding: 12px 25px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }
    a:hover {
      background-color: #f0f0f0;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>🚀 Welcome to My S3 Static Website!</h1>
  <p>This site is hosted directly from an Amazon S3 bucket using Terraform.</p>
  <a href="https://aws.amazon.com/s3/">Learn more about Amazon S3</a>
</body>
</html>
